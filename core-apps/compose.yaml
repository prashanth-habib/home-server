# Core infrastructure stack: Pi-hole, Nginx Proxy Manager & Arcane
services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    expose:
      - "3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./resources/homepage/config:/app/config
      - ./resources/homepage/images:/app/public/images:ro
    environment:
      HOMEPAGE_ALLOWED_HOSTS: localhost,127.0.0.1,${HOST_IP},homepage,home.lan
    networks:
      - proxy

  pihole:
    image: pihole/pihole:2025.06.2
    container_name: pihole
    restart: unless-stopped
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "67:67/udp"
    environment:
      TZ: 'Asia/Kolkata'
      FTLCONF_webserver_api_password: '${PIHOLE_PASS}'
      FTLCONF_dns_listeningMode: all
      FTLCONF_dns_hosts: |
        ${HOST_IP} main.lan
      FTLCONF_dns_cnameRecords: |
        arcane.home.lan,main.lan
        npm.home.lan,main.lan
        pihole.home.lan,main.lan
        gitea.home.lan,main.lan
        home.lan,main.lan
    volumes:
      - pihole_data:/etc/pihole
    networks:
      - dns
      - proxy

  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy-manager
    restart: unless-stopped
    ports:
      - "80:80"       # HTTP proxy
      - "443:443"     # HTTPS proxy
      - "81:81"       # Admin UI
    environment:
      INITIAL_ADMIN_EMAIL: ${NPM_USER}
      INITIAL_ADMIN_PASSWORD: ${NPM_PASS}
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    networks:
      - proxy
      - dns
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:81/api/"]
      interval: 10s
      timeout: 5s
      retries: 5

  arcane:
    image: ghcr.io/getarcaneapp/arcane:latest
    container_name: arcane
    restart: unless-stopped
    ports:
      - 3552:3552
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - arcane_data:/app/data
    environment:
      - APP_URL=http://arcane.home.lan
      - PUID=1000
      - PGID=1000
      - ENCRYPTION_KEY=${ARCANE_ENCRYPTION_KEY}
      - JWT_SECRET=${ARCANE_JWT_SECRET}
      - LOG_LEVEL=info
      - LOG_JSON=false
      - POSTGRES_DB=arcane
      - POSTGRES_USER=arcane
      - POSTGRES_PASSWORD=${ARCANE_DB_PASSWORD}
      - OIDC_ENABLED=false
      - DATABASE_URL=postgresql://arcane:${ARCANE_DB_PASSWORD}@arcane-postgres:5432/arcane
    depends_on:
      - postgres
    networks:
      - dns
      - proxy

  postgres:
    image: postgres:17-alpine
    container_name: arcane-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=arcane
      - POSTGRES_USER=arcane
      - POSTGRES_PASSWORD=${ARCANE_DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - 5432:5432
    networks:
      - proxy

  # Configure Nginx Proxy Manager with initial proxy host records
  npm-init:
    image: alpine:3.20
    container_name: npm-init
    depends_on:
      nginx-proxy-manager:
        condition: service_healthy
    volumes:
      - ./npm-init/init-proxy-hosts.sh:/init-proxy-hosts.sh:ro
    environment:
      NPM_USER: ${NPM_USER}
      NPM_PASS: ${NPM_PASS}
    command: >
      sh -c "apk add --no-cache curl jq && sh /init-proxy-hosts.sh"
    networks:
      - proxy
    restart: "no"

networks:
  dns:
    name: dns
    driver: bridge
  proxy:
    name: proxy
    driver: bridge

volumes:
  pihole_data:
    name: pihole_data
  npm_data:
    name: npm_data
  npm_letsencrypt:
    name: npm_letsencrypt
  arcane_data:
    name: arcane_data
  postgres_data:
    name: postgres_data
