services:
  gitea:
    image: docker.gitea.com/gitea:1.24.6
    container_name: gitea
    depends_on:
      - postgres
    restart: unless-stopped
    expose:
      - "3000"
    volumes:
      - gitea-data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=postgres:5432
      - GITEA__database__NAME=gitea
      - GITEA__database__USER=${GITEA_DB_USER}
      - GITEA__database__PASSWD=${GITEA_DB_PWD}
      # Enable Gitea Actions (CI/CD)
      - GITEA__actions__ENABLED=true
      # Enable the built-in Package + Container Registry
      - GITEA__packages__ENABLED=true
      # Required for container registry auth to work correctly behind NPM reverse proxy
      - GITEA__server__ROOT_URL=http://gitea.home.lan
    networks:
      - gitea
      - proxy

  gitea-runner:
    image: docker.io/gitea/act_runner:latest
    container_name: gitea-runner
    restart: unless-stopped
    depends_on:
      - gitea
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - gitea-runner-data:/data
    environment:
      - GITEA_INSTANCE_URL=http://gitea:3000
      - GITEA_RUNNER_REGISTRATION_TOKEN=${GITEA_RUNNER_REGISTRATION_TOKEN}
      - GITEA_RUNNER_NAME=home-runner
    networks:
      - gitea

  code-server:
    image: lscr.io/linuxserver/code-server:latest
    container_name: code-server
    restart: unless-stopped
    expose:
      - "8443"
    volumes:
      - code-server-data:/config
    environment:
      - PUID=${CODE_SERVER_PUID}
      - PGID=${CODE_SERVER_PGID}
      - TZ=${TZ}
      - PASSWORD=${CODE_SERVER_PASSWORD}
      - SUDO_PASSWORD=${CODE_SERVER_SUDO_PASSWORD}
    networks:
      - proxy

  postgres:
    image: docker.io/library/postgres:14
    container_name: postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${GITEA_DB_USER}
      - POSTGRES_PASSWORD=${GITEA_DB_PWD}
      - POSTGRES_DB=gitea
    networks:
      - gitea
    volumes:
      - gitea-postgres-data:/var/lib/postgresql/data

networks:
  proxy:
    name: proxy
    external: true
  gitea:
    name: gitea
    external: false

volumes:
  gitea-data:
    name: gitea-data
  gitea-postgres-data:
    name: gitea-postgres-data
  gitea-runner-data:
    name: gitea-runner-data
  code-server-data:
    name: code-server-data
