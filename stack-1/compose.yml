services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    expose:
      - "3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./resources/homepage/config:/app/config
      - ./resources/homepage/custom-images:/app/public/images:ro
    environment:
      HOMEPAGE_ALLOWED_HOSTS: localhost,127.0.0.1,${HOST_IP},homepage,home.lan
    networks:
      - home-server
      - proxy
  gitea:
    image: docker.gitea.com/gitea:1.24.6
    container_name: gitea
    depends_on:
      - postgres
    restart: unless-stopped
    expose:
      - "3000"
    volumes:
      - ./data/gitea:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=postgres:5432
      - GITEA__database__NAME=gitea
      - GITEA__database__USER=${GITEA_DB_USER}
      - GITEA__database__PASSWD=${GITEA_DB_PWD}
    networks:
      - gitea
      - proxy
  postgres:
    image: docker.io/library/postgres:14
    container_name: postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${GITEA_DB_USER}
      - POSTGRES_PASSWORD=${GITEA_DB_PWD}
      - POSTGRES_DB=gitea
    networks:
      - gitea
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

networks:
  home-server:
    name: home-server
    external: true
  proxy:
    name: proxy
    external: true
  gitea:
    name: gitea
    external: false